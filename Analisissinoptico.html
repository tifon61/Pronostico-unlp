<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Análisis Histórico GFS - Bentley</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { background: #2d2d2d; padding: 20px; border-radius: 10px; display: inline-block; }
        img { max-width: 100%; border: 2px solid #00f2ff; margin-top: 20px; background: black; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #00f2ff; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Archivo Sinóptico GFS (Bentley)</h1>
    
    <div class="box">
        <input type="date" id="fecha" value="2024-03-18">
        <select id="ciclo">
            <option value="00">00Z</option>
            <option value="06">06Z</option>
            <option value="12" selected>12Z</option>
            <option value="18">18Z</option>
        </select>
        <select id="prod">
            <option value="500_mslp_thickness">Espesores + 500hPa</option>
            <option value="850_temp_mslp_wind">850hPa Temp/Viento</option>
            <option value="250_wind_mslp">Jet Stream 250hPa</option>
            <option value="6hprecip_mslp_thick">Precipitación 6h</option>
        </select>
        <button onclick="cargar()">CARGAR CARTA</button>
    </div>

    <br>
    <img id="mapa" src="" alt="La imagen cargará aquí">

    <script>
        function cargar() {
            const f = document.getElementById('fecha').value.split('-');
            const anio = f[0];
            const mes = f[1];
            const dia = f[2];
            const z = document.getElementById('ciclo').value;
            const p = document.getElementById('prod').value;

            // NUEVA ESTRUCTURA DE ALICIA BENTLEY PARA SUDAMÉRICA
            // Ella ahora suele guardar los análisis f000 sin la carpeta de año repetida
            const url = `https://www.atmos.albany.edu/facstaff/bentley/realtime/images/gfs/southamer/${anio}${mes}${dia}${z}/${p}_f000.png`;
            
            console.log("Probando URL:", url);
            document.getElementById('mapa').src = url;
            
            document.getElementById('mapa').onerror = function() {
                // Si la anterior falla, probamos la ruta de "realtime" (para fechas muy recientes)
                this.src = `https://www.atmos.albany.edu/facstaff/bentley/realtime/images/gfs/southamer/${p}_f000.png`;
            };
        }
        window.onload = cargar;
    </script>
</body>
</html>
