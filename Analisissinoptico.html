<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Archivo Histórico Sinóptico - GFS</title>
    <style>
        :root { --bg: #0b0f19; --accent: #00d1ff; --card: #161b2c; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        .container { max-width: 1100px; margin: auto; }
        .controls { background: var(--card); padding: 20px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .map-frame { margin-top: 20px; background: #000; border: 2px solid #2d3748; border-radius: 10px; min-height: 600px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { width: 100%; height: auto; display: block; }

        input, select, button { background: #0b0f19; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; }
        button { background: var(--accent); color: #0b0f19; font-weight: bold; cursor: pointer; border: none; padding: 10px 25px; }
        
        .status-bar { margin: 10px 0; font-size: 0.9rem; color: var(--accent); font-family: monospace; }
        .desc { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rastreador de Situaciones Sinópticas Pasadas</h1>
    
    <div class="controls">
        <div>
            <label>Fecha:</label>
            <input type="date" id="fecha" value="2024-03-18">
        </div>
        <div>
            <label>Hora (UTC):</label>
            <select id="hora">
                <option value="00">00Z</option>
                <option value="06">06Z</option>
                <option value="12" selected>12Z</option>
                <option value="18">18Z</option>
            </select>
        </div>
        <div>
            <label>Nivel:</label>
            <select id="nivel">
                <option value="500hpa">500 hPa + Presión (Análisis Principal)</option>
                <option value="850temp">850 hPa (Temperatura/Frentes)</option>
                <option value="300wind">300 hPa (Corriente en Chorro)</option>
                <option value="prec">Precipitación Acumulada</option>
            </select>
        </div>
        <button onclick="cargarAnalisis()">GENERAR CARTA</button>
    </div>

    <div class="status-bar" id="status">Listo para analizar...</div>

    <div class="map-frame">
        <img id="mapa-historia" src="" alt="El mapa cargará aquí">
    </div>

    <div class="desc">
        Fuente: GFS Archive V2 (NCEP/NWS). Los mapas muestran el análisis (f000) de la situación sinóptica real ocurrida.
    </div>
</div>

<script>
    function cargarAnalisis() {
        const fechaRaw = document.getElementById('fecha').value;
        if (!fechaRaw) return;

        const partes = fechaRaw.split('-'); // [2024, 03, 18]
        const anio = partes[0];
        const mes = partes[1];
        const dia = partes[2];
        const h = document.getElementById('hora').value;
        const p = document.getElementById('nivel').value;
        const status = document.getElementById('status');

        // Meteociel Archive - La fuente más estable para el GFS histórico
        // Estructura: /modeles/archive/gfs-v2/YYYYMMDDHH/NIVEL/america-del-sur-1.png
        const url = `https://www.meteociel.fr/modeles/archive/gfs-v2/${anio}${mes}${dia}${h}/${p}/america-del-sur-1.png`;

        status.innerText = `Buscando: GFS ${anio}-${mes}-${dia} ${h}Z [${p}]`;
        
        const img = document.getElementById('mapa-historia');
        img.src = url;

        img.onerror = function() {
            status.innerText = "Error: No se encontró la carta. Intentando servidor alternativo...";
            // Intento con formato secundario (algunas fechas viejas usan .gif)
            if (!this.src.includes('.gif')) {
                this.src = url.replace('.png', '.gif');
            } else {
                status.innerText = "Error crítico: El dato no está disponible en el archivo.";
            }
        };

        img.onload = function() {
            status.innerText = `Carta de Análisis cargada correctamente.`;
        };
    }

    // Cargar automáticamente al abrir
    window.onload = cargarAnalisis;
</script>

</body>
</html>
