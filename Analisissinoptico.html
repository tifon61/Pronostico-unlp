<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Archivo Histórico GFS - Meteociel</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .map-container { margin-top: 20px; background: #000; border: 2px solid var(--accent); border-radius: 8px; min-height: 500px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; height: auto; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: var(--accent); color: #0f172a; font-weight: bold; cursor: pointer; border: none; }
        .info { margin-top: 10px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Archivo Histórico GFS (Meteociel)</h1>
    <p>Análisis de eventos pasados - Sudamérica</p>
    
    <div class="box">
        <input type="date" id="fecha" value="2024-04-18">
        <select id="ciclo">
            <option value="0">00Z</option>
            <option value="6">06Z</option>
            <option value="12" selected>12Z</option>
            <option value="18">18Z</option>
        </select>
        <select id="prod">
            <option value="500">500hPa + Presión</option>
            <option value="temp">Temperatura 850hPa</option>
            <option value="jet">Viento 300hPa (Jet)</option>
            <option value="prec">Precipitación</option>
        </select>
        <button onclick="cargarMeteociel()">CARGAR ANÁLISIS</button>
    </div>

    <div class="map-container">
        <img id="mapa" src="" alt="Cargue una fecha para ver el mapa">
    </div>

    <div class="info">
        <p id="debug-url"></p>
        <p>Fuente: Meteociel.fr - Datos históricos del GFS V2</p>
    </div>

    <script>
        function cargarMeteociel() {
            const f = document.getElementById('fecha').value.split('-');
            if(f.length < 3) return;
            
            const anio = f[0];
            const mes = f[1];
            const dia = f[2];
            const z = document.getElementById('ciclo').value;
            const p = document.getElementById('prod').value;

            // Formato de URL de Meteociel (Muy estable)
            // Ejemplo: https://www.meteociel.fr/modeles/archive/gfs-v2/2024041812/500hpa/america-del-sur-1.png
            
            let campo = "";
            if(p === "500") campo = "500hpa";
            if(p === "temp") campo = "850temp";
            if(p === "jet") campo = "300wind";
            if(p === "prec") campo = "prec";

            const url = `https://www.meteociel.fr/modeles/archive/gfs-v2/${anio}${mes}${dia}${z}/${campo}/america-del-sur-1.png`;
            
            console.log("Cargando:", url);
            document.getElementById('mapa').src = url;
            document.getElementById('debug-url').innerText = "URL actual: " + url;
        }

        // Cargar al iniciar
        window.onload = cargarMeteociel;
    </script>
</body>
</html>
