<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Archivo GFS - Alicia Bentley Pro</title>
    <style>
        :root { --bg: #0b0f19; --accent: #00f2ff; --card: #161b2c; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        .controls { 
            background: var(--card); padding: 20px; border-radius: 12px; 
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; 
            margin-bottom: 20px; border: 1px solid #334155;
        }

        .map-container { 
            width: 100%; max-width: 1100px; margin: auto;
            background: #000; border: 2px solid var(--accent); border-radius: 12px; 
            min-height: 600px; display: flex; align-items: center; justify-content: center;
        }
        img { width: 100%; height: auto; display: block; border-radius: 10px; }

        input, select, button { background: #0b0f19; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; }
        button { background: var(--accent); color: #0b0f19; font-weight: bold; cursor: pointer; border: none; padding: 10px 25px; }
        
        .status { margin-top: 10px; font-size: 0.8rem; color: #94a3b8; font-family: monospace; }
        .warning { color: #ffcc00; font-size: 0.75rem; margin-top: 5px; }
    </style>
</head>
<body>

    <h1 style="color: var(--accent);">ANÁLISIS SINÓPTICO - ALICIA BENTLEY</h1>
    
    <div class="controls">
        <input type="date" id="fecha" value="2024-03-18">
        <select id="ciclo">
            <option value="00">00Z</option>
            <option value="06">06Z</option>
            <option value="12" selected>12Z</option>
            <option value="18">18Z</option>
        </select>
        <select id="prod">
            <option value="500_mslp_thickness">Espesores + 500hPa</option>
            <option value="250_wind_mslp">Jet Stream (250hPa)</option>
            <option value="850_temp_mslp_wind">850hPa Temp/Viento</option>
            <option value="pw_mslp_wind">Agua Precipitable (PWAT)</option>
            <option value="6hprecip_mslp_thick">Precipitación 6h</option>
        </select>
        <button onclick="cargarBentley()">GENERAR CARTA</button>
    </div>

    <div class="status" id="status">Esperando comando...</div>

    <div class="map-container">
        <img id="mapa" src="" alt="La carta aparecerá aquí">
    </div>

    <div class="warning">
        * Nota: Si la fecha es muy antigua, es posible que el servidor de Albany ya no la tenga disponible.
    </div>

    <script>
        function cargarBentley() {
            const f = document.getElementById('fecha').value.split('-');
            const anio = f[0];
            const mes = f[1];
            const dia = f[2];
            const z = document.getElementById('ciclo').value;
            const p = document.getElementById('prod').value;
            const status = document.getElementById('status');
            const img = document.getElementById('mapa');

            // 1. Construimos la URL original de Albany
            const urlOriginal = `www.atmos.albany.edu/facstaff/bentley/realtime/images/gfs/southamer/archive/${anio}/${anio}${mes}${dia}${z}/${p}_f000.png`;
            
            // 2. La pasamos por un PROXY HTTPS (weserv.nl) para que GitHub no la bloquee
            const urlConProxy = `https://images.weserv.nl/?url=${urlOriginal}`;
            
            status.innerText = `Solicitando análisis a Albany vía Proxy...`;
            img.src = urlConProxy;

            img.onload = () => { status.innerText = `Carta cargada: ${anio}-${mes}-${dia} ${z}Z`; };
            img.onerror = () => { 
                status.innerText = `ERROR: No se encontró la imagen. Probá con una fecha más reciente o verificá el ciclo.`;
                img.src = "";
            };
        }

        window.onload = cargarBentley;
    </script>
</body>
</html>
