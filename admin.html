<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Pronosticador UNLP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --unlp-blue: #00315a; --bg-admin: #2c3e50; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: var(--bg-admin); color: white; }
        
        /* Sidebar de Edición */
        #sidebar { 
            width: 350px; background: white; height: 100vh; 
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            border-right: 5px solid var(--unlp-blue); color: #333;
        }
        
        #viewer { flex-grow: 1; padding: 20px; display: flex; justify-content: center; align-items: center; overflow: auto; }

        h2 { color: var(--unlp-blue); border-bottom: 2px solid; padding-bottom: 5px; margin-top: 0; }
        h4 { margin: 15px 0 5px 0; color: var(--unlp-blue); text-transform: uppercase; font-size: 0.8em; }
        
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: sans-serif; }
        .row { display: flex; gap: 5px; }
        
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn-download { background: var(--unlp-blue); color: white; border: none; padding: 12px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* Estilos de la Placa (Capture Area) */
        #capture-area {
            width: 1000px; background-color: #e6e7e8; padding: 30px; 
            border-radius: 10px; color: #00315a; box-sizing: border-box;
        }
        .header-placa {
            background-color: white; padding: 15px 30px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 5px solid #00315a; border-radius: 30px 30px 0 0; margin-bottom: 20px;
        }
        .header-placa img { height: 60px; }
        .grid-day-block { background: #00315a; border-radius: 20px; overflow: hidden; color: white; }
        .block-header { background: rgba(255,255,255,0.1); padding: 10px 30px; display: flex; justify-content: space-between; font-weight: 800; }
        
        .grid-main { display: grid; grid-template-columns: 180px repeat(3, 1fr); }
        .grid-cell { padding: 15px; text-align: center; border: 0.5px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .label-cell { background: rgba(0,0,0,0.15); font-weight: bold; align-items: flex-start; padding-left: 20px; font-size: 0.8em; }
        .temp-cell { font-size: 2.8em; font-weight: 300; }
        .wind-cell { font-size: 0.8em; }
        .weather-text { font-size: 0.8em; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>⚙️ Editor UNLP</h2>
    
    <label><h4>Ciudad</h4></label>
    <select id="city-select" onchange="document.getElementById('out-city').innerText = this.value">
        <option value="LA PLATA">La Plata</option>
        <option value="MAR DEL PLATA">Mar del Plata</option>
        <option value="JUNÍN">Junín</option>
    </select>

    <h4>Temperaturas Generales</h4>
    <div class="row">
        <input type="text" id="in-min" placeholder="Mín" oninput="update('out-min', this.value)">
        <input type="text" id="in-max" placeholder="Máx" oninput="update('out-max', this.value)">
    </div>

    <h4>Temperaturas por tramo</h4>
    <div class="row">
        <input type="text" placeholder="Mañana" oninput="update('t-m', this.value)">
        <input type="text" placeholder="Tarde" oninput="update('t-t', this.value)">
        <input type="text" placeholder="Noche" oninput="update('t-n', this.value)">
    </div>

    <h4>Vientos</h4>
    <input type="text" placeholder="Mañana" oninput="update('v-m', this.value)">
    <input type="text" placeholder="Tarde" oninput="update('v-t', this.value)">
    <input type="text" placeholder="Noche" oninput="update('v-n', this.value)">

    <h4>Estado del Tiempo</h4>
    <input type="text" placeholder="Mañana" oninput="update('w-m', this.value)">
    <input type="text" placeholder="Tarde" oninput="update('w-t', this.value)">
    <input type="text" placeholder="Noche" oninput="update('w-n', this.value)">

    <button class="btn-save" onclick="saveToWeb()">💾 GUARDAR PARA LA WEB</button>
    <button class="btn-download" onclick="downloadImage()">⬇ DESCARGAR PLACA (.PNG)</button>
</div>

<div id="viewer">
    <div id="capture-area">
        <div class="header-placa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Facultad_de_Ciencias_Astron%C3%B3micas_y_Geof%C3%ADsicas.svg/100px-Facultad_de_Ciencias_Astron%C3%B3micas_y_Geof%C3%ADsicas.svg.png">
            <div style="text-align: center;">
                <h1 id="out-city" style="margin:0; font-weight:900; font-size:3em;">LA PLATA</h1>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/UNLP_Logo_2016.svg/100px-UNLP_Logo_2016.svg.png">
        </div>

        <div class="grid-day-block">
            <div class="block-header">
                <span>HOY</span>
                <span id="out-date">10/ABR/26</span>
            </div>
            <div class="grid-main">
                <div class="grid-cell label-cell"></div>
                <div class="grid-cell">MAÑANA</div><div class="grid-cell">TARDE</div><div class="grid-cell">NOCHE</div>

                <div class="grid-cell label-cell">
                    <div style="color:#ffeb3b">MAX: <span id="out-max">--</span></div>
                    <div style="color:#81d4fa">MIN: <span id="out-min">--</span></div>
                </div>
                <div class="grid-cell temp-cell" id="t-m">--</div>
                <div class="grid-cell temp-cell" id="t-t" style="color:#ffeb3b">--</div>
                <div class="grid-cell temp-cell" id="t-n">--</div>

                <div class="grid-cell label-cell">VIENTOS</div>
                <div class="grid-cell wind-cell" id="v-m">--</div>
                <div class="grid-cell wind-cell" id="v-t">--</div>
                <div class="grid-cell wind-cell" id="v-n">--</div>

                <div class="grid-cell label-cell">TIEMPO</div>
                <div class="grid-cell"><span id="w-m">--</span></div>
                <div class="grid-cell"><span id="w-t">--</span></div>
                <div class="grid-cell"><span id="w-n">--</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Función mágica que actualiza la placa mientras escribes
    function update(id, value) {
        document.getElementById(id).innerText = value || '--';
    }

    function saveToWeb() {
        // Aquí iría la lógica para guardar en localStorage y que index.html lo lea
        alert("Datos guardados. Ahora index.html mostrará estos valores.");
    }

    function downloadImage() {
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Pronostico_UNLP.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    document.getElementById('out-date').innerText = new Date().toLocaleDateString();
</script>
</body>
</html>
