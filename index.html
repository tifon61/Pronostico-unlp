<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Pronóstico UNLP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --unlp-blue: #00315a; --bg: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #222; }
        
        /* Panel de Control Lateral */
        #sidebar { 
            width: 320px; background: white; height: 100vh; 
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            border-right: 5px solid var(--unlp-blue);
        }
        
        /* Area de Visualización */
        #viewer { flex-grow: 1; padding: 40px; display: flex; justify-content: center; align-items: flex-start; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.8em; color: var(--unlp-blue); }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .btn-download { background: var(--unlp-blue); color: white; border: none; padding: 12px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }

        /* Estilos de la Placa (Igual a la anterior) */
        #capture-area { width: 900px; background: #e6e7e8; padding: 25px; border-radius: 10px; color: var(--unlp-blue); }
        .header-placa { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--unlp-blue); border-radius: 30px 30px 0 0; }
        .grid-day { background: var(--unlp-blue); color: white; border-radius: 15px; margin-top: 15px; overflow: hidden; }
        .grid-row { display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        .grid-cell { flex: 1; padding: 12px; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--unlp-blue); border-bottom: 2px solid;">⚙️ Editor UNLP</h2>
    
    <label>Ciudad Activa:</label>
    <select id="city-select" onchange="loadCityData(this.value)">
        <option value="la-plata">La Plata</option>
        <option value="mar-del-plata">Mar del Plata</option>
        <option value="junin">Junín</option>
    </select>

    <label>Máxima Hoy:</label>
    <input type="text" id="in-max" oninput="sync()">
    
    <label>Mínima Hoy:</label>
    <input type="text" id="in-min" oninput="sync()">

    <label>Estado del Tiempo:</label>
    <textarea id="in-desc" oninput="sync()"></textarea>

    <label>Viento:</label>
    <input type="text" id="in-wind" oninput="sync()">

    <button class="btn-save" onclick="saveToDB()">💾 GUARDAR PARA LA WEB</button>
    <button class="btn-download" onclick="downloadPlaca()">⬇ DESCARGAR PLACA (PNG)</button>
</div>

<div id="viewer">
    <div id="capture-area">
        <div class="header-placa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Facultad_de_Ciencias_Astron%C3%B3micas_y_Geof%C3%ADsicas.svg/100px-Facultad_de_Ciencias_Astron%C3%B3micas_y_Geof%C3%ADsicas.svg.png">
            <div style="text-align: center;">
                <span style="background: var(--unlp-blue); color:white; padding: 2px 15px; border-radius: 10px; font-size: 0.7em;">PRONÓSTICO</span>
                <h1 id="out-city" style="margin:5px 0; font-size: 2.5em; font-weight: 900;">LA PLATA</h1>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/UNLP_Logo_2016.svg/100px-UNLP_Logo_2016.svg.png">
        </div>

        <div class="grid-day">
            <div style="padding: 10px 20px; font-weight: bold; background: rgba(255,255,255,0.1);" id="out-date">--</div>
            <div class="grid-row">
                <div class="grid-cell" style="background: rgba(0,0,0,0.2); font-weight: bold;">TEMP. MÁX</div>
                <div class="grid-cell" id="out-max" style="font-size: 1.5em; font-weight: 900; color: #ffeb3b;">--</div>
            </div>
            <div class="grid-row">
                <div class="grid-cell" style="background: rgba(0,0,0,0.2); font-weight: bold;">TIEMPO</div>
                <div class="grid-cell" id="out-desc">--</div>
            </div>
        </div>
        <p style="text-align: center; font-size: 0.7em; font-weight: bold;">* GRUPO DE PRONÓSTICO UNLP</p>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('unlp_db')) || {
        "la-plata": { max: "22°C", min: "11°C", desc: "Algo nublado", wind: "NE 10km/h" },
        "mar-del-plata": { max: "18°C", min: "9°C", desc: "Despejado", wind: "E 15km/h" },
        "junin": { max: "25°C", min: "12°C", desc: "Cielo cubierto", wind: "N 5km/h" }
    };

    function loadCityData(city) {
        const data = db[city];
        document.getElementById('out-city').innerText = city.replace('-', ' ').toUpperCase();
        document.getElementById('in-max').value = data.max;
        document.getElementById('in-min').value = data.min;
        document.getElementById('in-desc').value = data.desc;
        document.getElementById('in-wind').value = data.wind;
        sync();
    }

    function sync() {
        document.getElementById('out-max').innerText = document.getElementById('in-max').value;
        document.getElementById('out-desc').innerText = document.getElementById('in-desc').value;
    }

    function saveToDB() {
        const city = document.getElementById('city-select').value;
        db[city] = {
            max: document.getElementById('in-max').value,
            min: document.getElementById('in-min').value,
            desc: document.getElementById('in-desc').value,
            wind: document.getElementById('in-wind').value,
            updated: new Date().toLocaleTimeString()
        };
        localStorage.setItem('unlp_db', JSON.stringify(db));
        alert("✅ Datos actualizados para la Web Pública");
    }

    function downloadPlaca() {
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Pronostico_${document.getElementById('city-select').value}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    document.getElementById('out-date').innerText = new Date().toLocaleDateString();
    loadCityData('la-plata');
</script>
</body>
</html>
