<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control Meteorológico Profesional | UNLP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --unlp-blue: #00315a; --unlp-green: #00796b; --unlp-light: #5899d2; --bg-canvas: #e6e7e8; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #1a1a1a; color: white; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 450px; background: white; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 5px solid var(--unlp-blue); color: #333; }
        .section-title { background: var(--unlp-blue); color: white; padding: 8px 12px; margin: 15px 0 10px; font-weight: 900; font-size: 0.75em; border-radius: 4px; text-transform: uppercase; }
        h4 { margin: 10px 0 5px; color: var(--unlp-blue); text-transform: uppercase; font-size: 0.65em; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.85em; margin-bottom: 5px; font-family: inherit; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; }

        .btn { border: none; padding: 12px; cursor: pointer; font-weight: 900; border-radius: 8px; color: white; transition: 0.3s; width: 100%; margin-bottom: 10px; }
        .btn-save { background: #28a745; border-bottom: 4px solid #1e7e34; }
        .btn-p1 { background: var(--unlp-blue); } .btn-p2 { background: var(--unlp-green); }

        #viewer { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; gap: 40px; }
        .placa-box { width: 950px; background-color: var(--bg-canvas); padding: 35px; color: var(--unlp-blue); border-radius: 5px; box-sizing: border-box; }

        /* HEADER */
        .header-placa { background-color: white; padding: 15px 35px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--unlp-blue); border-radius: 40px 40px 0 0; margin-bottom: 15px; }
        .logos-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        .logos-right { display: flex; align-items: center; justify-content: flex-end; flex: 1; }
        .header-placa img { height: 60px; width: auto; object-fit: contain; }
        .header-placa h1 { margin: 0; font-weight: 900; font-size: 3.2em; letter-spacing: -2px; flex: 2; text-align: center; text-transform: uppercase; }

        .grid-day-block { background: var(--unlp-blue); border-radius: 25px; overflow: hidden; color: white; margin-bottom: 15px; }
        .grid-day-block.verde { background: var(--unlp-green); }
        .block-header { background: rgba(0,0,0,0.2); padding: 8px 30px; display: flex; justify-content: space-between; font-weight: 800; font-size: 0.9em; }

        .grid-main { display: grid; }
        .grid-3 { grid-template-columns: 190px repeat(3, 1fr); }
        .grid-4 { grid-template-columns: 190px repeat(4, 1fr); }

        .grid-cell { padding: 8px 5px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 45px; }
        .label-cell { background: rgba(0,0,0,0.15); font-weight: 900; align-items: flex-start; padding-left: 25px; font-size: 0.7em; text-transform: uppercase; border-right: 2px solid rgba(255,255,255,0.1); }
        
        .icon-cell { min-height: 100px; }
        .icon-cell img { height: 85px; width: auto; }

        .temp-cell { font-size: 2.5em; font-weight: 400; line-height: 1; }
        .data-text { font-size: 0.8em; font-weight: 600; line-height: 1.1; }
        .footer-note { text-align: center; font-size: 0.85em; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="font-size: 1.1em; color: var(--unlp-blue);">ADMIN PRONÓSTICO UNLP</h2>
    
    <label><h4>Ciudad / Emisión</h4></label>
    <div class="row">
        <select id="city-selector" onchange="updateCity(this.value)">
            <option value="La Plata">La Plata</option>
            <option value="Mar del Plata">Mar del Plata</option>
            <option value="Junín">Junín</option>
        </select>
        <input type="text" id="in-hora-emision" placeholder="08:00hs" oninput="up('out-hora', this.value)">
    </div>

    <button class="btn btn-save" onclick="saveToWeb()">🌐 GUARDAR EN LA WEB</button>
    <button class="btn btn-p1" onclick="download('placa-1', 'CortoPlazo')">⬇ BAJAR PLACA 1</button>
    <button class="btn btn-p2" onclick="download('placa-2', 'Extendido')">⬇ BAJAR PLACA 2</button>

    <div class="section-title">DÍA 1 (HOY)</div>
    <div class="row">
        <input type="text" placeholder="Min Urb/Sub" oninput="up('h-min', this.value.split('/')[0]); up('h-min-sub', this.value.split('/')[1])">
        <input type="text" placeholder="Max Urb/Sub" oninput="up('h-max', this.value.split('/')[0]); up('h-max-sub', this.value.split('/')[1])">
    </div>
    <input type="text" placeholder="Temps M, T, N" oninput="upMulti(['h-t1','h-t2','h-t3'], this.value)">
    
    <h4>Tiempo (Día 1)</h4>
    <select id="h-sel-w1" onchange="updateWeather('h', 1, this.value)"><option value="">Mañana...</option><option value="despejado">Despejado</option><option value="ligeramente nublado">Ligeramente nublado</option><option value="algo nublado">Algo nublado</option><option value="parcialmente nublado">Parcialmente nublado</option><option value="cubierto">Cubierto</option><option value="lluvias aisladas">Lluvias aisladas</option><option value="nieblas">Nieblas</option><option value="lluvias y tormentas">Lluvias y tormentas</option></select>
    <select id="h-sel-w2" onchange="updateWeather('h', 2, this.value)"><option value="">Tarde...</option><option value="despejado">Despejado</option><option value="ligeramente nublado">Ligeramente nublado</option><option value="algo nublado">Algo nublado</option><option value="parcialmente nublado">Parcialmente nublado</option><option value="cubierto">Cubierto</option><option value="lluvias aisladas">Lluvias aisladas</option><option value="nieblas">Nieblas</option><option value="lluvias y tormentas">Lluvias y tormentas</option></select>
    <select id="h-sel-w3" onchange="updateWeather('h', 3, this.value)"><option value="">Noche...</option><option value="despejado">Despejado</option><option value="ligeramente nublado">Ligeramente nublado</option><option value="algo nublado">Algo nublado</option><option value="parcialmente nublado">Parcialmente nublado</option><option value="cubierto">Cubierto</option><option value="lluvias aisladas">Lluvias aisladas</option><option value="nieblas">Nieblas</option><option value="lluvias y tormentas">Lluvias y tormentas</option></select>

    <h4>Viento (Intensidad / Dirección)</h4>
    <div class="row">
        <select id="h-v-i1" onchange="updateWind('h', 1)"><option value="">Intensidad M</option><option value="leves">Leves</option><option value="moderados">Moderados</option><option value="regulares">Regulares</option><option value="fuertes">Fuertes</option></select>
        <select id="h-v-d1" onchange="updateWind('h', 1)"><option value="">Dirección M</option><option value="norte">del norte</option><option value="sur">del sur</option><option value="este">del este</option><option value="oeste">del oeste</option><option value="noreste">del noreste</option><option value="noroeste">del noroeste</option><option value="sudeste">del sudeste</option><option value="sudoeste">del sudoeste</option></select>
    </div>
    <div class="row">
        <select id="h-v-i2" onchange="updateWind('h', 2)"><option value="">Intensidad T</option><option value="leves">Leves</option><option value="moderados">Moderados</option><option value="regulares">Regulares</option><option value="fuertes">Fuertes</option></select>
        <select id="h-v-d2" onchange="updateWind('h', 2)"><option value="">Dirección T</option><option value="norte">del norte</option><option value="sur">del sur</option><option value="este">del este</option><option value="oeste">del oeste</option><option value="noreste">del noreste</option><option value="noroeste">del noroeste</option><option value="sudeste">del sudeste</option><option value="sudoeste">del sudoeste</option></select>
    </div>
    <div class="row">
        <select id="h-v-i3" onchange="updateWind('h', 3)"><option value="">Intensidad N</option><option value="leves">Leves</option><option value="moderados">Moderados</option><option value="regulares">Regulares</option><option value="fuertes">Fuertes</option></select>
        <select id="h-v-d3" onchange="updateWind('h', 3)"><option value="">Dirección N</option><option value="norte">del norte</option><option value="sur">del sur</option><option value="este">del este</option><option value="oeste">del oeste</option><option value="noreste">del noreste</option><option value="noroeste">del noroeste</option><option value="sudeste">del sudeste</option><option value="sudoeste">del sudoeste</option></select>
    </div>

    </div>

<div id="viewer">
    <div id="placa-1" class="placa-box">
        <div class="header-placa">
            <div class="logos-left"><img src="images/Logo astronomicas y geofisicas.png"><img src="images/Logo pronounlp.jfif" style="height: 70px;"></div>
            <h1 class="city-label">LA PLATA</h1>
            <div class="logos-right"><img src="images/Logo unlp.png"></div>
        </div>

        <div style="background: white; border-radius: 15px; margin-bottom: 10px; padding: 5px 20px; display: flex; justify-content: space-between; font-weight: 900; font-size: 0.8em;">
            <span class="f0">--</span><span>Hora de emisión: <span id="out-hora">08:00hs</span></span>
        </div>

        <div class="grid-day-block">
            <div class="block-header"><span class="n0">--</span><div class="row" style="gap:20px;"><span>MAÑANA</span><span>TARDE</span><span>NOCHE</span></div></div>
            <div class="grid-main grid-3">
                <div class="grid-cell label-cell">
                    <div class="row" style="width:100%; justify-content: space-around;">
                        <div>TEMP. MIN<br><span id="h-min">--</span><br><span id="h-min-sub" style="font-size:0.8em; opacity:0.7">--*</span></div>
                        <div>MAX.<br><span id="h-max">--</span><br><span id="h-max-sub" style="font-size:0.8em; opacity:0.7">--*</span></div>
                    </div>
                </div>
                <div class="grid-cell icon-cell"><img id="h-icon-1" src="images/default.png"></div>
                <div class="grid-cell icon-cell"><img id="h-icon-2" src="images/default.png"></div>
                <div class="grid-cell icon-cell"><img id="h-icon-3" src="images/default.png"></div>

                <div class="grid-cell label-cell" style="border:none"></div>
                <div class="grid-cell temp-cell" id="h-t1">--</div><div class="grid-cell temp-cell" id="h-t2" style="color:#ffeb3b">--</div><div class="grid-cell temp-cell" id="h-t3">--</div>
                
                <div class="grid-cell label-cell">VIENTOS</div>
                <div class="grid-cell data-text" id="h-v1">--</div>
                <div class="grid-cell data-text" id="h-v2">--</div>
                <div class="grid-cell data-text" id="h-v3">--</div>

                <div class="grid-cell label-cell">TIEMPO</div>
                <div class="grid-cell data-text" id="h-w1">--</div>
                <div class="grid-cell data-text" id="h-w2">--</div>
                <div class="grid-cell data-text" id="h-w3">--</div>
            </div>
        </div>
        <div class="footer-note">* TEMPERATURA EN ZONA SUBURBANA</div>
    </div>
</div>

<script>
    const iconMap = {
        "despejado": "soleado.png",
        "ligeramente nublado": "ligeramente_nublado.png",
        "algo nublado": "algo_nublado.png",
        "parcialmente nublado": "parcialmente_nublado.png",
        "cubierto": "cubierto.png",
        "lluvias aisladas": "lluvias_aisladas.png",
        "nieblas": "nieblas.png",
        "lluvias y tormentas": "tormentas.png"
    };

    function updateWeather(dia, tramo, valor) {
        document.getElementById(`${dia}-w${tramo}`).innerText = valor || "--";
        const imgElement = document.getElementById(`${dia}-icon-${tramo}`);
        imgElement.src = iconMap[valor] ? `images/${iconMap[valor]}` : `images/default.png`;
    }

    // NUEVA FUNCIÓN PARA VIENTOS
    function updateWind(dia, tramo) {
        const intensidad = document.getElementById(`${dia}-v-i${tramo}`).value;
        const direccion = document.getElementById(`${dia}-v-d${tramo}`).value;
        
        const output = (intensidad && direccion) ? `${intensidad} ${direccion}` : "--";
        document.getElementById(`${dia}-v${tramo}`).innerText = output;
    }

    function up(id, v) { 
        let val = v ? v.trim() : '--';
        if(id.includes('min') || id.includes('max') || id.includes('t')) val += '°';
        document.getElementById(id).innerText = val; 
    }

    function upMulti(ids, v) { 
        const p = v.split(','); 
        ids.forEach((id, i) => { if(p[i]) up(id, p[i]); }); 
    }

    function updateCity(v) { document.querySelectorAll('.city-label').forEach(el => el.innerText = v); }

    function saveToWeb() {
        const city = document.getElementById('city-selector').value;
        const data = {
            location: city,
            emission_time: document.getElementById('out-hora').innerText,
            // Aquí se mapearían todos los datos capturados para el backend
        };
        localStorage.setItem('unlp_db', JSON.stringify(data));
        alert("✅ Sincronizado.");
    }

    function download(id, name) {
        html2canvas(document.getElementById(id), { scale: 3, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = `UNLP_${name}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // Fechas dinámicas
    const dias = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
    const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
    const hoy = new Date();
    for(let i=0; i<5; i++) {
        let d = new Date(); d.setDate(hoy.getDate() + i);
        document.querySelectorAll(`.n${i}`).forEach(el => el.innerText = dias[d.getDay()]);
        document.querySelectorAll(`.f${i}`).forEach(el => el.innerText = `${d.getDate()}/${meses[d.getMonth()]}/${d.getFullYear().toString().slice(-2)}`);
    }
</script>
</body>
</html>
