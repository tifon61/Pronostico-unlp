<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEO-DASHBOARD | UNLP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NAVBAR TECNOLÓGICA */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.5em; color: var(--primary); }
        
        .nav-links button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-links button:hover {
            background: var(--primary);
            color: var(--dark);
            box-shadow: 0 0 15px var(--primary);
        }

        /* SECCIÓN PÚBLICO: GRILLA DE CIUDADES */
        .dashboard {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .city-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .city-card:hover { transform: translateY(-10px); border-color: var(--primary); }

        .city-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.05;
            pointer-events: none;
        }

        .city-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .city-name { font-size: 2em; font-weight: 900; text-transform: uppercase; margin: 0; }
        .temp-main { font-size: 4em; font-weight: 300; margin: 10px 0; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .data-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .data-label { font-size: 0.7em; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .data-val { font-size: 1.1em; margin-top: 5px; }

        /* EDITOR MODAL / OVERLAY */
        #editor {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            padding: 50px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .editor-container {
            background: #1e293b;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--primary);
        }

        input {
            background: #0f172a;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-action {
            background: var(--primary);
            color: var(--dark);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            margin-right: 10px;
        }

        /* OCULTAR ELEMENTOS PARA LA FOTO */
        .no-export { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo">METEO<span style="color:white">UNLP</span></div>
    <div class="nav-links">
        <span id="last-update" style="margin-right: 20px; font-size: 0.8em; opacity: 0.7;"></span>
        <button onclick="toggleEditor()">MODO PRONOSTICADOR</button>
    </div>
</nav>

<div class="dashboard" id="public-dashboard">
    </div>

<div id="editor">
    <div class="editor-container">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h2>Panel de Control</h2>
            <button onclick="toggleEditor()" style="background:none; border:none; color:white; font-size:2em; cursor:pointer;">&times;</button>
        </div>
        
        <label>Seleccionar Ciudad a Editar:</label>
        <select id="city-to-edit" onchange="renderEditorFields()" style="width:100%; padding:10px; margin-bottom:20px; border-radius:10px;">
            <option value="la-plata">La Plata</option>
            <option value="mar-del-plata">Mar del Plata</option>
            <option value="junin">Junín</option>
        </select>

        <div id="fields-container"></div>

        <div style="margin-top: 30px;">
            <button class="btn-action" onclick="saveChanges()">GUARDAR Y ACTUALIZAR</button>
            <button class="btn-action" style="background: #e91e63; color: white;" onclick="exportarImagen()">DESCARGAR GRÁFICA (.PNG)</button>
        </div>
    </div>
</div>

<script>
    // BASE DE DATOS LOCAL
    let db = JSON.parse(localStorage.getItem('meteoDataPro')) || {
        "la-plata": { min: "11", max: "22", m: "13°/Noroeste", t: "Despejado", v: "Noreste leve" },
        "mar-del-plata": { min: "9", max: "19", m: "10°/Sur", t: "Algo nublado", v: "Sudeste moderado" },
        "junin": { min: "12", max: "26", m: "14°/Calma", t: "Despejado", v: "Norte" }
    };

    function init() {
        renderDashboard();
        document.getElementById('last-update').innerText = "ACTUALIZADO: " + new Date().toLocaleTimeString();
    }

    function renderDashboard() {
        const container = document.getElementById('public-dashboard');
        container.innerHTML = '';

        for (const [id, data] of Object.entries(db)) {
            const card = document.createElement('div');
            card.className = 'city-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <div class="city-header">
                    <h2 class="city-name">${id.replace('-', ' ')}</h2>
                    <span style="font-size: 2em;">${getIcon(data.t)}</span>
                </div>
                <div class="temp-main">${data.max}°</div>
                <div style="color: var(--primary); font-weight: bold; margin-bottom: 20px;">${data.t}</div>
                
                <div class="data-grid">
                    <div class="data-item">
                        <div class="data-label">Mínima</div>
                        <div class="data-val">${data.min}°C</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Viento</div>
                        <div class="data-val">${data.v}</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Mañana</div>
                        <div class="data-val">${data.m.split('/')[0]}</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Estado</div>
                        <div class="data-val" style="font-size:0.8em">OFICIAL UNLP</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
    }

    function getIcon(desc) {
        desc = desc.toLowerCase();
        if(desc.includes('despejado')) return '☀️';
        if(desc.includes('nublado')) return '☁️';
        if(desc.includes('lluvia')) return '🌧️';
        return '🌤️';
    }

    function toggleEditor() {
        const el = document.getElementById('editor');
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        if(el.style.display === 'block') renderEditorFields();
    }

    function renderEditorFields() {
        const city = document.getElementById('city-to-edit').value;
        const data = db[city];
        const container = document.getElementById('fields-container');
        container.innerHTML = `
            <label>Temperatura Máxima:</label><input id="in-max" value="${data.max}">
            <label>Temperatura Mínima:</label><input id="in-min" value="${data.min}">
            <label>Descripción del Tiempo:</label><input id="in-t" value="${data.t}">
            <label>Información de Viento:</label><input id="in-v" value="${data.v}">
            <label>Dato Mañana (Temp/Viento):</label><input id="in-m" value="${data.m}">
        `;
    }

    function saveChanges() {
        const city = document.getElementById('city-to-edit').value;
        db[city] = {
            max: document.getElementById('in-max').value,
            min: document.getElementById('in-min').value,
            t: document.getElementById('in-t').value,
            v: document.getElementById('in-v').value,
            m: document.getElementById('in-m').value
        };
        localStorage.setItem('meteoDataPro', JSON.stringify(db));
        renderDashboard();
        alert("¡Datos de " + city + " actualizados con éxito!");
    }

    async function exportarImagen() {
        const city = document.getElementById('city-to-edit').value;
        const card = document.getElementById(`card-${city}`);
        
        // Efecto visual para la captura
        card.style.background = "#0f172a"; 
        
        html2canvas(card, {
            backgroundColor: '#0f172a',
            scale: 3, // Calidad Ultra HD para Instagram
            borderRadius: 30
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Pronostico_${city}_UNLP.png`;
            link.href = canvas.toDataURL();
            link.click();
            card.style.background = "rgba(255, 255, 255, 0.1)"; // Restaurar
        });
    }

    init();
</script>

</body>
</html>
