<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativa de Pluviómetros - UNLP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-title { color: #94a3b8; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 2.25rem; font-weight: 700; color: #38bdf8; }
        .iframe-container { height: 500px; width: 100%; border-radius: 12px; overflow: hidden; border: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Monitoreo de Precipitación</h1>
                <p class="text-slate-400">Panel Comparativo EMA Violeta & Campbell</p>
            </div>
            
            <div class="glass p-4 rounded-2xl flex items-center gap-4">
                <label for="dateSelector" class="font-medium text-sm">Consultar Fecha:</label>
                <input type="date" id="dateSelector" class="bg-slate-800 border border-slate-600 rounded-lg p-2 text-white outline-none focus:border-sky-500">
                <button onclick="updateDashboard()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded-lg transition-all font-bold shadow-lg">
                    Actualizar
                </button>
            </div>
        </header>

        <!-- Tarjetas de Acumulados -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-500 relative">
                <div class="flex justify-between items-start mb-2">
                    <p class="card-title">EMA VIOLETA</p>
                    <span id="channelBadge" class="bg-purple-500/20 text-purple-400 text-[10px] px-2 py-1 rounded">Cargando Canal...</span>
                </div>
                <p class="stat-value" id="accumVioleta">0.00 <span class="text-lg font-normal text-slate-500">mm</span></p>
                <p class="text-slate-400 text-xs mt-2" id="msgVioleta">Esperando datos...</p>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-sky-500 relative">
                <div class="flex justify-between items-start mb-2">
                    <p class="card-title">CAMPBELL</p>
                    <span class="bg-sky-500/20 text-sky-400 text-[10px] px-2 py-1 rounded">ID: 2823820 | F5</span>
                </div>
                <p class="stat-value" id="accumCampbell">0.00 <span class="text-lg font-normal text-slate-500">mm</span></p>
                <p class="text-slate-400 text-xs mt-2" id="msgCampbell">Esperando datos...</p>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="grid grid-cols-1 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl shadow-xl min-h-[400px]">
                <h3 class="text-lg font-bold mb-6 text-slate-200">Comparativa Horaria (mm)</h3>
                <div class="relative w-full h-[350px]">
                    <canvas id="precipChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Iframes -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-4 rounded-2xl">
                <h3 class="font-bold mb-4 text-sm text-slate-400">Wunderground ILAPLA66</h3>
                <iframe src="https://www.wunderground.com/dashboard/pws/ILAPLA66" class="iframe-container bg-white"></iframe>
            </div>
            <div class="glass p-4 rounded-2xl">
                <h3 class="font-bold mb-4 text-sm text-slate-400">Meteo FCAGLP UNLP</h3>
                <iframe src="https://meteo.fcaglp.unlp.edu.ar/" class="iframe-container bg-white"></iframe>
            </div>
        </div>

        <div id="debugInfo" class="text-[10px] text-slate-600 text-center uppercase tracking-widest pb-8">
            Sistema inicializado
        </div>
    </div>

    <script>
        const VIOLETA_NUEVA = { id: "2626952", api: "4XYH56YSV64HE17H", field: 5, mult: 0.34 };
        const VIOLETA_VIEJA = { id: "1778165", api: "OJ1JHKAPCCIQB4CB", field: 1, mult: 0.34 }; // Asumo Field 1 para la vieja, ajustar si es otro
        const CAMPBELL = { id: "2823820", api: "FFI1HK80ZKDNS6V8", field: 5, mult: 1 };

        let myChart = null;

        // Fecha de hoy local
        const d = new Date();
        const fechaHoy = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('dateSelector').value = fechaHoy;

        function getVioletaConfig(selectedDate) {
            const dateObj = new Date(selectedDate + "T12:00:00");
            const ayer = new Date();
            ayer.setDate(ayer.getDate() - 1);
            ayer.setHours(0,0,0,0);

            if (dateObj < ayer) {
                document.getElementById('channelBadge').innerText = "CANAL HISTÓRICO (1778165)";
                return VIOLETA_VIEJA;
            } else {
                document.getElementById('channelBadge').innerText = "CANAL ACTUAL (2626952)";
                return VIOLETA_NUEVA;
            }
        }

        async function fetchStationData(config, date) {
            const url = `https://api.thingspeak.com/channels/${config.id}/fields/${config.field}.json?api_key=${config.api}&start=${date}%2000:00:00&end=${date}%2023:59:59&timezone=America/Argentina/Buenos_Aires`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                return data.feeds || [];
            } catch (e) {
                console.error("Error fetching station " + config.id, e);
                return [];
            }
        }

        function process(feeds, fieldNum, mult) {
            const hourly = Array(24).fill(0);
            let total = 0;
            const key = "field" + fieldNum;

            feeds.forEach(f => {
                const val = parseFloat(f[key]);
                if (!isNaN(val) && val > 0) {
                    const h = new Date(f.created_at).getHours();
                    const amount = mult; // En el caso de pulsos, cada entrada es 1 pulso
                    hourly[h] += amount;
                    total += amount;
                }
            });
            return { total: total.toFixed(2), hourly, count: feeds.length };
        }

        async function updateDashboard() {
            const date = document.getElementById('dateSelector').value;
            const debug = document.getElementById('debugInfo');
            debug.innerText = "Consultando datos...";

            const violetaCfg = getVioletaConfig(date);
            
            const [feedsV, feedsC] = await Promise.all([
                fetchStationData(violetaCfg, date),
                fetchStationData(CAMPBELL, date)
            ]);

            const resV = process(feedsV, violetaCfg.field, violetaCfg.mult);
            const resC = process(feedsC, CAMPBELL.field, CAMPBELL.mult);

            document.getElementById('accumVioleta').innerHTML = `${resV.total} <span class="text-lg font-normal text-slate-500">mm</span>`;
            document.getElementById('accumCampbell').innerHTML = `${resC.total} <span class="text-lg font-normal text-slate-500">mm</span>`;
            
            document.getElementById('msgVioleta').innerText = `Registros: ${resV.count}`;
            document.getElementById('msgCampbell').innerText = `Registros: ${resC.count}`;

            debug.innerText = `Datos actualizados para ${date}`;
            renderChart(resV.hourly, resC.hourly);
        }

        function renderChart(dataV, dataC) {
            const canvas = document.getElementById('precipChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                    datasets: [
                        {
                            label: 'Violeta',
                            data: dataV,
                            backgroundColor: '#a855f7',
                            borderRadius: 4
                        },
                        {
                            label: 'Campbell',
                            data: dataC,
                            backgroundColor: '#0ea5e9',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            suggestedMax: 1,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#64748b' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#64748b' }
                        }
                    }
                }
            });
        }

        // Ejecutar al cargar
        window.onload = () => {
            setTimeout(updateDashboard, 800);
        };
    </script>
</body>
</html>
