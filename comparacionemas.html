<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativa de Pluviómetros - UNLP</title>
    <!-- Cargamos Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cargamos Chart.js -->
    <script id="chart-script" src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-title { color: #94a3b8; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 2.25rem; font-weight: 700; color: #38bdf8; }
        .iframe-container { height: 500px; width: 100%; border-radius: 12px; overflow: hidden; border: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Monitoreo de Precipitación</h1>
                <p class="text-slate-400">Panel Comparativo EMA Violeta & Campbell</p>
            </div>
            
            <div class="glass p-4 rounded-2xl flex items-center gap-4">
                <label for="dateSelector" class="font-medium text-sm text-slate-300">Consultar Fecha:</label>
                <input type="date" id="dateSelector" class="bg-slate-800 border border-slate-600 rounded-lg p-2 text-white outline-none focus:border-sky-500">
                <button onclick="updateDashboard()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded-lg transition-all font-bold shadow-lg shadow-sky-900/20">
                    <i class="fa-solid fa-sync-alt mr-2"></i>Actualizar
                </button>
            </div>
        </header>

        <!-- Acumulados Totales del Día -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-500 relative">
                <div class="flex justify-between items-start mb-2">
                    <p class="card-title">EMA VIOLETA</p>
                    <span id="channelBadge" class="bg-purple-500/20 text-purple-400 text-[10px] px-2 py-1 rounded tracking-wider">Buscando...</span>
                </div>
                <p class="stat-value" id="accumVioleta">0.00 <span class="text-lg font-normal text-slate-500">mm</span></p>
                <p class="text-slate-400 text-xs mt-2" id="msgVioleta">Cargando...</p>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-sky-500 relative">
                <div class="flex justify-between items-start mb-2">
                    <p class="card-title">CAMPBELL</p>
                    <span class="bg-sky-500/20 text-sky-400 text-[10px] px-2 py-1 rounded tracking-wider">0.1 mm/pulso</span>
                </div>
                <p class="stat-value" id="accumCampbell">0.00 <span class="text-lg font-normal text-slate-500">mm</span></p>
                <p class="text-slate-400 text-xs mt-2" id="msgCampbell">Cargando...</p>
            </div>
        </div>

        <!-- Gráfico Principal de Líneas (Acumulado) -->
        <div class="grid grid-cols-1 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl shadow-xl min-h-[450px]">
                <h3 class="text-lg font-bold mb-6 text-slate-200">Curva de Precipitación Acumulada (mm)</h3>
                <div id="chartParent" class="relative w-full h-[380px]">
                    <canvas id="precipChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Iframes de Referencia -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-4 rounded-2xl">
                <h3 class="font-bold mb-4 text-sm text-slate-400">Wunderground ILAPLA66</h3>
                <iframe src="https://www.wunderground.com/dashboard/pws/ILAPLA66" class="iframe-container bg-white"></iframe>
            </div>
            <div class="glass p-4 rounded-2xl">
                <h3 class="font-bold mb-4 text-sm text-slate-400">Meteo FCAGLP UNLP</h3>
                <iframe src="https://meteo.fcaglp.unlp.edu.ar/" class="iframe-container bg-white"></iframe>
            </div>
        </div>

        <div id="debugInfo" class="text-[10px] text-slate-600 text-center uppercase tracking-widest pb-8">
            Sincronizando estaciones...
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE CANALES
        const V_ACTUAL = { id: "2626952", api: "4XYH56YSV64HE17H", field: 5, mult: 0.34, label: "Actual" };
        const V_HISTORICO = { id: "1778165", api: "OJ1JHKAPCCIQB4CB", field: 1, mult: 0.34, label: "Histórico" };
        const C_STATION = { id: "2823820", api: "FFI1HK80ZKDNS6V8", field: 5, mult: 0.1, label: "Campbell" };

        let myChart = null;

        // Establecer fecha por defecto (Hoy)
        const d = new Date();
        const fechaHoy = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('dateSelector').value = fechaHoy;

        async function fetchFeeds(station, date) {
            const url = `https://api.thingspeak.com/channels/${station.id}/fields/${station.field}.json?api_key=${station.api}&start=${date}%2000:00:00&end=${date}%2023:59:59&timezone=America/Argentina/Buenos_Aires`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                return data.feeds || [];
            } catch (e) {
                console.error("Error consultando API", e);
                return [];
            }
        }

        /**
         * Procesa los datos y genera el array acumulativo
         */
        function processData(feeds, fieldNum, mult) {
            const hourlyValues = Array(24).fill(0);
            let totalPrecip = 0;
            let pulseCount = 0;
            const fieldKey = "field" + fieldNum;

            feeds.forEach(f => {
                const val = parseFloat(f[fieldKey]);
                // Cada registro con valor > 0 cuenta como 1 pulso completo
                if (!isNaN(val) && val > 0) {
                    const timestamp = new Date(f.created_at);
                    const hour = timestamp.getHours();
                    hourlyValues[hour] += mult;
                    totalPrecip += mult;
                    pulseCount++;
                }
            });

            // Convertir valores horarios en acumulativos (Curva)
            const cumulativeArray = Array(24).fill(0);
            let currentSum = 0;
            for (let i = 0; i < 24; i++) {
                currentSum += hourlyValues[i];
                cumulativeArray[i] = currentSum;
            }

            return { total: totalPrecip.toFixed(2), cumulative: cumulativeArray, pulseCount };
        }

        async function updateDashboard() {
            const date = document.getElementById('dateSelector').value;
            const debug = document.getElementById('debugInfo');
            debug.innerText = "Consultando datos en tiempo real...";

            // Lógica de búsqueda inteligente
            let feedsV = await fetchFeeds(V_ACTUAL, date);
            let activeConfigV = V_ACTUAL;

            if (feedsV.length === 0) {
                debug.innerText = "Buscando en canal histórico...";
                feedsV = await fetchFeeds(V_HISTORICO, date);
                activeConfigV = V_HISTORICO;
            }

            const feedsC = await fetchFeeds(C_STATION, date);

            const resV = processData(feedsV, activeConfigV.field, activeConfigV.mult);
            const resC = processData(feedsC, C_STATION.field, C_STATION.mult);

            // Actualizar tarjetas de interfaz
            document.getElementById('channelBadge').innerText = `${activeConfigV.label.toUpperCase()} (${activeConfigV.id}) | 0.34mm`;
            document.getElementById('accumVioleta').innerHTML = `${resV.total} <span class="text-lg font-normal text-slate-500">mm</span>`;
            document.getElementById('accumCampbell').innerHTML = `${resC.total} <span class="text-lg font-normal text-slate-500">mm</span>`;
            
            document.getElementById('msgVioleta').innerText = `Pulsos reales: ${resV.pulseCount}`;
            document.getElementById('msgCampbell').innerText = `Pulsos reales: ${resC.pulseCount}`;

            debug.innerText = `Visualizando acumulados para: ${date}`;
            
            if (typeof Chart !== 'undefined') {
                renderChart(resV.cumulative, resC.cumulative);
            }
        }

        function renderChart(dataV, dataC) {
            const ctx = document.getElementById('precipChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                    datasets: [
                        {
                            label: 'EMA Violeta (Acumulado mm)',
                            data: dataV,
                            borderColor: '#a855f7',
                            backgroundColor: 'rgba(168, 85, 247, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 4,
                            pointBackgroundColor: '#a855f7'
                        },
                        {
                            label: 'Campbell (Acumulado mm)',
                            data: dataC,
                            borderColor: '#0ea5e9',
                            backgroundColor: 'rgba(14, 165, 233, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 4,
                            pointBackgroundColor: '#0ea5e9'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            display: true, 
                            labels: { color: '#94a3b8', font: { weight: 'bold' } } 
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: (ctx) => ` ${ctx.dataset.label}: ${ctx.raw.toFixed(2)} mm`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { 
                                color: '#94a3b8',
                                callback: (val) => val + ' mm'
                            },
                            title: { display: true, text: 'Milímetros Totales', color: '#64748b' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        // Control de carga seguro de Chart.js
        window.addEventListener('load', function() {
            const checkChart = setInterval(function() {
                if (typeof Chart !== 'undefined') {
                    clearInterval(checkChart);
                    updateDashboard();
                }
            }, 100);
        });
    </script>
</body>
</html>
