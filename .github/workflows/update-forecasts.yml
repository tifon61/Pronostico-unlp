name: Actualizar caché de pronósticos

on:
  # Disparado desde Apps Script justo después de publicar un pronóstico
  repository_dispatch:
    types: [forecast-published]
  # Corridas de respaldo por si el disparo de arriba falla
  schedule:
    - cron: '0 11 * * *'  # 08:00 hora Argentina
    - cron: '0 17 * * *'  # 14:00 hora Argentina
    - cron: '0 23 * * *'  # 20:00 hora Argentina
  # Para probar manualmente desde la pestaña Actions
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Consultar Apps Script y armar data/forecasts.json
        run: python3 scripts/fetch_forecasts.py

      - name: Commitear si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecasts.json
          git diff --staged --quiet || git commit -m "Actualizar caché de pronósticos"
          git push
